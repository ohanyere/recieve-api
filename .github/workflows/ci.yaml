name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write
  packages: write
  security-events: write

jobs:
  repository-initialized:
    name: repository initialized
    runs-on: ubuntu-latest
    outputs:
      initialized: ${{ steps.guard.outputs.initialized }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check repository initialization
        id: guard
        env:
          IDP_REPOSITORY_INITIALIZED: .idp/repository-initialized
        run: |
          if test -f "$IDP_REPOSITORY_INITIALIZED"; then
            echo "initialized=true" >> "$GITHUB_OUTPUT"
          else
            echo "initialized=false" >> "$GITHUB_OUTPUT"
          fi

  validate:
    name: validate
    needs: repository-initialized
    if: needs.repository-initialized.outputs.initialized == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate
        run: make validate

  build-sign:
    name: build and sign
    needs: [repository-initialized, validate]
    if: needs.repository-initialized.outputs.initialized == 'true'
    uses: ohanyere/platform-core/.github/workflows/reusable-build-sign.yaml@main
    with:
      service_name: recieve-api
      dockerhub_namespace: kuberpull
      image_tag: ${{ github.sha }}
      dockerfile_path: ./Dockerfile
      context_path: .
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  scan:
    name: scan
    needs: [repository-initialized, build-sign]
    if: needs.repository-initialized.outputs.initialized == 'true'
    uses: ohanyere/platform-core/.github/workflows/reusable-scan.yaml@main
    with:
      image_ref: kuberpull/recieve-api:${{ github.sha }}
    secrets: inherit

  policy-check:
    name: policy check
    needs: [repository-initialized, scan]
    if: needs.repository-initialized.outputs.initialized == 'true'
    uses: ohanyere/platform-core/.github/workflows/reusable-policy-check.yaml@main
    with:
      manifest_path: k8s/overlays/prod
    secrets: inherit

  promote-dev:
    name: promote image to dev
    needs: [repository-initialized, policy-check]
    if: "${{ needs.repository-initialized.outputs.initialized == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main' && github.event.head_commit.message != 'chore: promote image to dev' }}"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Update dev image tag
        run: |
          perl -0pi -e 's|(name:\s*kuberpull/recieve-api\n\s*newTag:\s*)[^\n]+|${1}'"${GITHUB_SHA}"'|' k8s/overlays/dev/kustomization.yaml

      - name: Commit dev promotion
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/dev/kustomization.yaml
          git diff --cached --quiet || git commit -m "chore: promote image to dev"
          git push
