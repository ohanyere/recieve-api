apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: recieve-api-alerts
  labels:
    app.kubernetes.io/name: recieve-api
    release: prometheus
spec:
  groups:
    - name: recieve-api.availability
      rules:
        - alert: recieve-apiHighErrorRate
          expr: sum(rate(http_requests_total{service="recieve-api",status=~"5.."}[5m])) / sum(rate(http_requests_total{service="recieve-api"}[5m])) > 0.05
          for: 10m
          labels:
            severity: warning
            team: Payments
          annotations:
            summary: recieve-api has elevated 5xx responses.
            runbook_url: docs/RUNBOOK.md
        - alert: recieve-apiUnavailable
          expr: up{job="recieve-api"} == 0
          for: 5m
          labels:
            severity: critical
            team: Payments
          annotations:
            summary: recieve-api is not being scraped or is unavailable.
            runbook_url: docs/RUNBOOK.md
